name: Deploy to Cloudflare Pages (mybonzo.com)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src
            public
            lib
            pages
            workers
            bin
            client
            package.json
            package-lock.json
            astro.config.mjs
            tailwind.config.mjs
            tsconfig.json
            wrangler.toml
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Astro site (skip type checking)
        run: npm run build:fast
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          NODE_ENV: "production"

      - name: Build verification
        run: |
          echo "✅ Build OK - deployed automatically via mybonzo-new Git integration"
          echo "🌐 https://mybonzo-new.pages.dev → mybonzo.com"
          echo "📦 Commit: ${{ github.sha }}"
