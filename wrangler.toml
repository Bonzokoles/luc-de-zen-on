name = "mybonzo-new"
compatibility_date = "2025-11-05"
pages_build_output_dir = "dist"

# ====== Cloudflare D1 — baza danych SQLite ======
[[d1_databases]]
binding = "D1"
database_name = "mybonzo"
database_id = "84f0f3cb-7778-4cc4-a6ba-e823ef52f1f3"

# ====== Cloudflare R2 — storage plików (PDF, CSV) ======
[[r2_buckets]]
binding = "R2_FINANSE"
bucket_name = "mybonzo-finanse"

# ====== Zmienne środowiskowe ======
[vars]
TENANT_ID = "meblepumo"
